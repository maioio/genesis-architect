# folder-structures.toml
# Single source of truth for all scaffold folder structures.
# Used by scripts/scaffold_generator.py
# Loaded via tomllib (Python 3.11+ stdlib). No external dependencies.
#
# MANDATORY PRODUCTION DEFAULTS (must appear in every archetype tree):
#   .env.example
#   .pre-commit-config.yaml
#   sonar-project.properties
#   docs/adr/001-initial-architecture.md
#   .github/workflows/ci.yml
#   RESEARCH.md
#   PITFALLS.md
#   ROADMAP.md
#
# Language-specific security file (when archetype handles file paths or user input):
#   python: src/{name}/utils/security.py
#   typescript: src/utils/security.ts
#   go: internal/utils/security.go
#   rust: src/utils/security.rs

[typescript.minimalist]
files = [
    "src/index.ts",
    "src/core.ts",
    "src/utils/security.ts",
    "tests/core.test.ts",
    ".github/workflows/ci.yml",
    ".env.example",
    ".pre-commit-config.yaml",
    "sonar-project.properties",
    "docs/adr/001-initial-architecture.md",
    ".genesis/vault/README.md",
    "package.json",
    "tsconfig.json",
    "RESEARCH.md",
    "PITFALLS.md",
    "ROADMAP.md",
]

[typescript.scalable]
files = [
    "src/index.ts",
    "src/domain/.gitkeep",
    "src/services/.gitkeep",
    "src/infrastructure/.gitkeep",
    "src/config/index.ts",
    "src/utils/security.ts",
    "tests/unit/.gitkeep",
    "tests/integration/.gitkeep",
    ".github/workflows/ci.yml",
    ".env.example",
    ".pre-commit-config.yaml",
    "sonar-project.properties",
    "docs/adr/001-initial-architecture.md",
    ".genesis/vault/README.md",
    "package.json",
    "tsconfig.json",
    "RESEARCH.md",
    "PITFALLS.md",
    "ROADMAP.md",
]

