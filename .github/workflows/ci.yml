name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: detect --source=. --verbose --redact

  security-scan:
    name: Dependency Security (Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for Snyk scan
        run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt - skipping pip install"

      - name: Run Snyk Python scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-python.sarif

      - name: Upload Snyk SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-python.sarif
        continue-on-error: true

  sonarcloud:
    name: Static Analysis (SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.coverage.exclusions=**/*
            -Dsonar.qualitygate.wait=false

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run research validator on example (format)
        run: python scripts/research_validator.py examples/typescript-cli/RESEARCH.md

      - name: Run research validator on example (live citations)
        # Live URL check - this enforces the headline "no fabricated citations"
        # guarantee. --issues-only skips the RESEARCH.md-shaped section checks
        # (which don't apply to PITFALLS.md). The validator already returns
        # success on transient network errors / rate limits, so a flake won't
        # block the PR; only an actual 404 will fail this step.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/research_validator.py examples/typescript-cli/PITFALLS.md --verify-issues --issues-only

      - name: Run research validator on template
        run: python scripts/research_validator.py assets/RESEARCH.template.md

      - name: Run eval runner
        run: python scripts/eval_runner.py --mode report

      - name: Run scaffold generator smoke test (all language/tier combos)
        # Cover every (language, tier) so a missing _starter_content case is
        # caught here rather than shipping invalid stubs to a real scaffold.
        # The generator now raises NotImplementedError on unhandled filenames,
        # so any miss makes this step fail loudly.
        run: |
          set -e
          for lang in python typescript go rust; do
            for tier in minimalist scalable; do
              out="/tmp/scaffold-$lang-$tier"
              python scripts/scaffold_generator.py --language "$lang" --tier "$tier" --name "smoke" --output "$out"
            done
          done
          test -f /tmp/scaffold-python-minimalist/pyproject.toml
          test -f /tmp/scaffold-python-minimalist/src/smoke/__init__.py
          test -f /tmp/scaffold-typescript-minimalist/.github/workflows/ci.yml
          test -f /tmp/scaffold-rust-scalable/src/config.rs
          echo "Scaffold smoke test passed for all 8 combos"

      - name: Check SKILL.md constraints
        run: |
          lines=$(wc -l < SKILL.md)
          echo "SKILL.md lines: $lines"
          if [ "$lines" -gt 400 ]; then echo "FAIL: over 400 lines"; exit 1; fi
          if grep -P "[—–]" SKILL.md; then echo "FAIL: em dashes found in SKILL.md"; exit 1; fi
          echo "SKILL.md constraints OK"

      - name: Check no em dashes in any file
        run: |
          found=$(grep -rP "[—–]" --include="*.md" --include="*.py" --include="*.json" \
            --exclude-dir=".git" \
            --exclude="ci.yml" . || true)
          if [ -n "$found" ]; then
            echo "FAIL: em dashes found:"
            echo "$found"
            exit 1
          fi
          echo "OK: no em dashes"
