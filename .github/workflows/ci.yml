name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: detect --source=. --verbose --redact

  security-scan:
    name: Dependency Security (Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies for Snyk scan
        run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt - skipping pip install"

      - name: Run Snyk Python scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-python.sarif

      - name: Upload Snyk SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-python.sarif
        continue-on-error: true

  sonarcloud:
    name: Static Analysis (SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.coverage.exclusions=**/*
            -Dsonar.qualitygate.wait=false

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Phase 0 env probe (self-check)
        run: python scripts/env_probe.py --self-check

      - name: Run research validator on example
        run: python scripts/research_validator.py examples/typescript-cli/RESEARCH.md

      - name: Run research validator on template
        run: python scripts/research_validator.py assets/RESEARCH.template.md

      - name: Run eval runner
        run: python scripts/eval_runner.py --mode report

      - name: Run scaffold generator smoke test
        run: |
          python scripts/scaffold_generator.py --language python --tier minimalist --name test-project --output /tmp/test-scaffold
          test -f /tmp/test-scaffold/pyproject.toml
          test -f /tmp/test-scaffold/src/test_project/__init__.py
          echo "Scaffold smoke test passed"

      - name: Check SKILL.md constraints
        run: |
          lines=$(wc -l < SKILL.md)
          echo "SKILL.md lines: $lines"
          if [ "$lines" -gt 400 ]; then echo "FAIL: over 400 lines"; exit 1; fi
          if grep -P "[—–]" SKILL.md; then echo "FAIL: em dashes found in SKILL.md"; exit 1; fi
          echo "SKILL.md constraints OK"

      - name: Check no em dashes in any file
        run: |
          found=$(grep -rP "[—–]" --include="*.md" --include="*.py" --include="*.json" \
            --exclude-dir=".git" \
            --exclude="ci.yml" . || true)
          if [ -n "$found" ]; then
            echo "FAIL: em dashes found:"
            echo "$found"
            exit 1
          fi
          echo "OK: no em dashes"
