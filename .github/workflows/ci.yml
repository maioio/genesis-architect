name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-cov -q

      - name: Phase 0 env probe (self-check)
        run: python scripts/env_probe.py --self-check

      - name: Run unit tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=scripts --cov-report=xml:coverage.xml

      - name: Run research validator on example
        run: python scripts/research_validator.py examples/typescript-cli/RESEARCH.md

      - name: Run research validator (live citation check)
        # --issues-only skips RESEARCH.md section checks (not applicable to PITFALLS.md).
        # Returns success on transient network errors; only a real 404 fails this step.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/research_validator.py examples/typescript-cli/PITFALLS.md --verify-issues --issues-only

      - name: Run research validator on template
        run: python scripts/research_validator.py assets/RESEARCH.template.md

      - name: Validate eval schema
        run: python scripts/eval_runner.py --mode validate

      - name: Run eval runner
        run: python scripts/eval_runner.py --mode report

      - name: Scaffold smoke test (all 8 language/tier combos)
        # Raises NotImplementedError on any unhandled filename - catches stub regressions.
        run: |
          set -e
          for lang in python typescript go rust; do
            for tier in minimalist scalable; do
              out="/tmp/scaffold-$lang-$tier"
              python scripts/scaffold_generator.py --language "$lang" --tier "$tier" --name "smoke" --output "$out"
            done
          done
          test -f /tmp/scaffold-python-minimalist/pyproject.toml
          test -f /tmp/scaffold-python-minimalist/src/smoke/__init__.py
          test -f /tmp/scaffold-typescript-minimalist/.github/workflows/ci.yml
          test -f /tmp/scaffold-rust-scalable/src/config.rs
          echo "Scaffold smoke test passed for all 8 combos"

      - name: Run pitfall coverage check on example
        run: python scripts/pitfall_coverage_check.py examples/python-cli/PITFALLS.md examples/python-cli/src/

      - name: Check SKILL.md constraints
        run: |
          lines=$(wc -l < SKILL.md)
          echo "SKILL.md lines: $lines"
          if [ "$lines" -gt 400 ]; then echo "FAIL: over 400 lines"; exit 1; fi
          if grep -P "[—–]" SKILL.md; then echo "FAIL: em dashes found in SKILL.md"; exit 1; fi
          echo "SKILL.md constraints OK"

      - name: Check no em dashes in any file
        run: |
          found=$(grep -rP "[—–]" --include="*.md" --include="*.py" --include="*.json" \
            --exclude-dir=".git" \
            --exclude="ci.yml" . || true)
          if [ -n "$found" ]; then
            echo "FAIL: em dashes found:"
            echo "$found"
            exit 1
          fi
          echo "OK: no em dashes"

  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: Static Analysis (SonarCloud)
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate coverage report
        run: |
          pip install pytest pytest-cov -q
          python -m pytest tests/ -q --cov=scripts --cov-report=xml:coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=false

  security-scan:
    name: Dependency Security (Snyk)
    runs-on: ubuntu-latest
    if: ${{ vars.SNYK_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt - skipping"

      - name: Run Snyk scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-python.sarif

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-python.sarif
        continue-on-error: true
