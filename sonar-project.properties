sonar.projectKey=maioio_genesis-architect
sonar.organization=maioio
sonar.projectName=Genesis Architect
sonar.projectVersion=2.0.0

# Source: Python scripts only (SKILL.md and references are documentation)
sonar.sources=scripts
sonar.language=python
sonar.python.version=3.11

# Exclusions: test fixtures, generated output, cache
sonar.exclusions=scripts/__pycache__/**,**/*.pyc,evals/**

# Coverage: not yet configured, disable to avoid false negatives
sonar.python.coverage.reportPaths=

# Quality gate: security rating A, maintainability A, 0 bugs
sonar.qualitygate.wait=true
