[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "genesis-architect"
version = "0.1.0"
description = "Research first. Build once. Scans real GitHub repos before scaffolding."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["scaffold", "cli", "ai", "github", "research", "project-generator"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "typer>=0.12",
]

[project.optional-dependencies]
ai = ["litellm>=1.0"]

[project.scripts]
genesis = "genesis_architect.cli:main"

[project.urls]
Homepage = "https://github.com/maioio/genesis-architect"
Source   = "https://github.com/maioio/genesis-architect"

[tool.setuptools.packages.find]
where = ["src"]
