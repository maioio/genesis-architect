name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-cov -q

      - name: Phase 0 env probe (self-check)
        run: python scripts/env_probe.py --self-check

      - name: Run unit tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=scripts --cov-report=xml:coverage.xml

      - name: Run research validator on example
        run: python scripts/research_validator.py examples/typescript-cli/RESEARCH.md

      - name: Run research validator (live citation check)
        # --issues-only skips RESEARCH.md section checks (not applicable to PITFALLS.md).
        # Returns success on transient network errors; only a real 404 fails this step.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/research_validator.py examples/typescript-cli/PITFALLS.md --verify-issues --issues-only

      - name: Run research validator on template
        run: python scripts/research_validator.py assets/RESEARCH.template.md

      - name: Validate eval schema
        run: python scripts/eval_runner.py --mode validate

      - name: Run eval runner
        run: python scripts/eval_runner.py --mode report

      - name: Scaffold smoke test (all 8 language/tier combos)
        # Raises NotImplementedError on any unhandled filename - catches stub regressions.
        run: |
          set -e
          for lang in python typescript go rust; do
            for tier in minimalist scalable; do
              out="/tmp/scaffold-$lang-$tier"
              python scripts/scaffold_generator.py --language "$lang" --tier "$tier" --name "smoke" --output "$out"
            done
          done
          test -f /tmp/scaffold-python-minimalist/pyproject.toml
          test -f /tmp/scaffold-python-minimalist/src/smoke/__init__.py
          test -f /tmp/scaffold-typescript-minimalist/.github/workflows/ci.yml
          test -f /tmp/scaffold-rust-scalable/src/config.rs
          echo "Scaffold smoke test passed for all 8 combos"

      - name: Run pitfall coverage check on example
        run: python scripts/pitfall_coverage_check.py examples/python-cli/PITFALLS.md examples/python-cli/src/ --check-platform-risks

      - name: Genesis evidence pack (example)
        # Generates ARCHITECTURE_EVIDENCE.md + .genesis/evidence.json from the example project.
        # Fails if RESEARCH.md/PITFALLS.md/ROADMAP.md are missing or contain only template text.
        run: python scripts/evidence_pack.py generate --project-dir examples/python-cli/

      - name: Genesis mitigation enforcement on example
        # Hard check: every mitigation_file_path in PITFALLS.md must exist and contain real code.
        # --allow-unmapped: pitfalls without mitigation_file_path (e.g. config-file mitigations) are
        # reported as warnings but do not fail the build. Only missing or stub-only files fail.
        run: |
          python scripts/mitigation_enforcer.py \
            examples/python-cli/PITFALLS.md \
            --src-root examples/python-cli/ \
            --allow-unmapped

      - name: Run drift detector on example (Level 2)
        # Level 2: structural drift + AST import boundary violations.
        # .genesis/evidence.json is generated by the evidence pack step above.
        # Exits 0 if no structural drift and no forbidden imports detected.
        run: python scripts/drift_detector.py examples/python-cli/ --level 2 --json

      - name: Genesis state machine smoke test
        # Verifies genesis_state.py write+require cycle works correctly.
        # Tests: write-phase2 records state, require-phase2 reads it back (exit 0).
        # If require-phase2 exits 1, the state machine is broken.
        run: |
          python scripts/genesis_state.py write-phase2 /tmp/genesis-state-test \
            --repo-count 12 --deep-count 5
          python scripts/genesis_state.py require-phase2 /tmp/genesis-state-test
          python scripts/genesis_state.py write-phase3-validation /tmp/genesis-state-test
          python scripts/genesis_state.py require-phase3-validation /tmp/genesis-state-test
          echo "genesis_state.py: write+require cycle OK"

      - name: Verify own evidence pack (dogfooding)
        # Genesis Architect generates its own ARCHITECTURE_EVIDENCE.md from SELF_RESEARCH.md.
        # This proves the toolchain works on a real project (itself).
        run: |
          python scripts/evidence_pack.py generate \
            --project-dir . \
            --research-path SELF_RESEARCH.md \
            --pitfalls-path SELF_PITFALLS.md \
            --roadmap-path SELF_ROADMAP.md
          python scripts/mitigation_enforcer.py SELF_PITFALLS.md --src-root .

      - name: Check SKILL.md constraints
        run: |
          lines=$(wc -l < SKILL.md)
          echo "SKILL.md lines: $lines"
          if [ "$lines" -gt 400 ]; then echo "FAIL: over 400 lines"; exit 1; fi
          if grep -P "[—–]" SKILL.md; then echo "FAIL: em dashes found in SKILL.md"; exit 1; fi
          echo "SKILL.md constraints OK"

      - name: Check no em dashes in any file
        run: |
          found=$(grep -rP "[—–]" --include="*.md" --include="*.py" --include="*.json" \
            --exclude-dir=".git" \
            --exclude="ci.yml" . || true)
          if [ -n "$found" ]; then
            echo "FAIL: em dashes found:"
            echo "$found"
            exit 1
          fi
          echo "OK: no em dashes"

  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: Static Analysis (SonarCloud)
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate coverage report
        run: |
          pip install pytest pytest-cov -q
          python -m pytest tests/ -q --cov=scripts --cov-report=xml:coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=false

  security-scan:
    name: Dependency Security (Snyk)
    runs-on: ubuntu-latest
    if: ${{ vars.SNYK_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt - skipping"

      - name: Run Snyk scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-python.sarif

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-python.sarif
        continue-on-error: true
